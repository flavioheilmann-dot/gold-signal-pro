name: Signal Scanner

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch: {}     # manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cooldown cache
        uses: actions/cache@v4
        with:
          path: .signal-cache.json
          key: box-cool-${{ github.run_id }}
          restore-keys: box-cool-

      - name: Track-record cache (Box)
        uses: actions/cache@v4
        with:
          path: track-box.json
          key: box-track-${{ github.run_id }}
          restore-keys: box-track-

      - name: Read ICT track (read-only, for confluence)
        uses: actions/cache/restore@v4
        with:
          path: track-ict.json
          key: box-read-${{ github.run_id }}
          restore-keys: ict-track-

      - name: Run scanner
        env:
          CAPITAL_ENV: ${{ secrets.CAPITAL_ENV }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_API_PASSWORD: ${{ secrets.CAPITAL_API_PASSWORD }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node server/gh-scanner.mjs
